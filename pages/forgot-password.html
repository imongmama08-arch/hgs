<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — REWEAR</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="../index.html">REWEAR</a>
                </div>
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your email to receive a reset link</p>
            </div>

            <form class="auth-form" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" name="email" required 
                           placeholder="Enter your email" autocomplete="email">
                    <div class="form-error" id="emailError"></div>
                </div>

                <button type="submit" class="btn-primary-large auth-submit" id="resetSubmit">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-spinner hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-error auth-form-error" id="formError"></div>
                <div class="form-success auth-form-success hidden" id="formSuccess">
                    <div class="success-icon">✓</div>
                    <p>Reset link sent! Check your email for instructions.</p>
                </div>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="login.html" class="auth-link">Sign in</a></p>
                <p>Don't have an account? <a href="signup.html" class="auth-link">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/local-auth.js"></script>
    <script>
        // Initialize forgot password page
        document.addEventListener('DOMContentLoaded', () => {
            if (window.authManager) {
                window.authManager.initForgotPasswordPage();
            }
        });
    </script>
</body>
</html>

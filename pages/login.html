﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login â€” REWEAR</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="../index.html">REWEAR</a>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your account</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email" required 
                           placeholder="Enter your email" autocomplete="email">
                    <div class="form-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="loginPassword" name="password" required 
                               placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
                            <span class="password-toggle-icon">ðŸ‘</span>
                        </button>
                    </div>
                    <div class="form-error" id="passwordError"></div>
                </div>

                <div class="auth-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="auth-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary-large auth-submit" id="loginSubmit">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-spinner hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-error auth-form-error" id="formError"></div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" class="auth-link">Sign up</a></p>

                <!-- Google Sign In -->
                <div class="auth-divider"><span>or continue with</span></div>
                <button type="button" class="btn-google" id="googleSignInBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="auth-divider"><span>or</span></div>
                <a href="../index.html" class="auth-link-secondary">Continue as guest</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../api/supabase.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ready = () => {
                if (window.authManager?._initialized) {
                    window.authManager.initLoginPage();
                } else {
                    setTimeout(ready, 50);
                }
            };
            ready();

            // Google Sign In button
            document.getElementById('googleSignInBtn').addEventListener('click', async () => {
                const btn = document.getElementById('googleSignInBtn');
                btn.disabled = true;
                btn.textContent = 'Connecting to Google...';
                try {
                    const { error } = await db.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin + '/pages/login.html'
                        }
                    });
                    if (error) throw error;
                    // Supabase redirects automatically — no need to do anything here
                } catch (err) {
                    btn.disabled = false;
                    btn.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
                    const errEl = document.getElementById('formError');
                    if (errEl) { errEl.textContent = err.message; errEl.classList.add('visible'); }
                }
            });
        });
    </script>
</body>
</html>

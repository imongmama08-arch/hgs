﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up â€” REWEAR</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="../index.html">REWEAR</a>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join REWEAR and start shopping</p>
            </div>

            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" name="name" required 
                           placeholder="Enter your full name" autocomplete="name">
                    <div class="form-error" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" name="email" required 
                           placeholder="Enter your email" autocomplete="email">
                    <div class="form-error" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="signupPassword" name="password" required 
                               placeholder="Create a password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
                            <span class="password-toggle-icon">ðŸ‘</span>
                        </button>
                    </div>
                    <div class="password-requirements">
                        <small>Password must be at least 8 characters long</small>
                    </div>
                    <div class="form-error" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" required 
                               placeholder="Confirm your password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="Show password">
                            <span class="password-toggle-icon">ðŸ‘</span>
                        </button>
                    </div>
                    <div class="form-error" id="confirmPasswordError"></div>
                </div>

                <div class="form-group">
                    <label for="accountType">Account Type</label>
                    <select id="accountType" name="accountType" required>
                        <option value="">Select account type</option>
                        <option value="buyer">Buyer - I want to shop</option>
                        <option value="seller">Seller - I want to sell products</option>
                    </select>
                    <div class="form-error" id="accountTypeError"></div>
                </div>

                <div class="auth-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="agreeTerms" required>
                        <span class="checkbox-label">
                            I agree to the <a href="#" class="auth-link">Terms of Service</a> 
                            and <a href="#" class="auth-link">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn-primary-large auth-submit" id="signupSubmit">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-spinner hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-error auth-form-error" id="formError"></div>
                <div class="form-success hidden" id="formSuccess">
                    <p>Account created successfully!</p>
                </div>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>

                <!-- Google Sign Up -->
                <div class="auth-divider"><span>or sign up with</span></div>

                <!-- Account type picker shown before Google redirect -->
                <div class="google-account-type" id="googleAccountTypePicker" style="display:none">
                    <p style="font-size:13px;color:#666;margin-bottom:10px;">Choose your account type first:</p>
                    <div style="display:flex;gap:10px;margin-bottom:12px;">
                        <label style="flex:1;cursor:pointer">
                            <input type="radio" name="googleAccountType" value="buyer" checked style="margin-right:6px">
                            <span style="font-size:14px;">🛍️ Buyer</span>
                        </label>
                        <label style="flex:1;cursor:pointer">
                            <input type="radio" name="googleAccountType" value="seller" style="margin-right:6px">
                            <span style="font-size:14px;">🏪 Seller</span>
                        </label>
                    </div>
                    <button type="button" class="btn-google" id="googleConfirmBtn">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    </button>
                    <button type="button" onclick="document.getElementById('googleAccountTypePicker').style.display='none';document.getElementById('googleSignUpBtn').style.display='flex';" style="background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;margin-top:8px;width:100%;">Cancel</button>
                </div>

                <button type="button" class="btn-google" id="googleSignUpBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign up with Google
                </button>

                <div class="auth-divider"><span>or</span></div>
                <a href="../index.html" class="auth-link-secondary">Continue as guest</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../api/supabase.js"></script>
    <script src="../js/core.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ready = () => {
                if (window.authManager?._initialized) {
                    window.authManager.initSignupPage();
                } else {
                    setTimeout(ready, 50);
                }
            };
            ready();

            // Show account type picker when Google button clicked
            document.getElementById('googleSignUpBtn').addEventListener('click', () => {
                document.getElementById('googleSignUpBtn').style.display = 'none';
                document.getElementById('googleAccountTypePicker').style.display = 'block';
            });

            // Confirm account type then redirect to Google
            document.getElementById('googleConfirmBtn').addEventListener('click', async () => {
                const accountType = document.querySelector('input[name="googleAccountType"]:checked')?.value || 'buyer';
                const btn = document.getElementById('googleConfirmBtn');
                btn.disabled = true;
                btn.textContent = 'Connecting to Google...';

                // Store account type so the auth callback can use it
                sessionStorage.setItem('google_account_type', accountType);

                try {
                    const { error } = await db.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin + '/pages/login.html',
                            queryParams: {
                                // Pass account type as a hint
                                access_type: 'offline',
                                prompt: 'consent'
                            }
                        }
                    });
                    if (error) throw error;
                } catch (err) {
                    btn.disabled = false;
                    btn.textContent = 'Continue with Google';
                    const errEl = document.getElementById('formError');
                    if (errEl) { errEl.textContent = err.message; errEl.classList.add('visible'); }
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test - REWEAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .test-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        .test-item {
            padding: 12px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-item .label {
            font-weight: 600;
            color: #555;
        }
        .test-item .value {
            color: #333;
            font-family: 'Courier New', monospace;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 10px 10px 0 0;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background: #5568d3;
        }
        .btn.secondary {
            background: #6c757d;
        }
        .btn.secondary:hover {
            background: #5a6268;
        }
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .console-output .log {
            margin: 3px 0;
        }
        .console-output .error {
            color: #f48771;
        }
        .console-output .success {
            color: #89d185;
        }
        .console-output .info {
            color: #6cb6ff;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔧 Dashboard Diagnostic Test</h1>
        <p style="color: #666; margin-bottom: 20px;">Testing if seller dashboard can load properly</p>

        <div id="statusContainer"></div>

        <div class="test-item">
            <span class="label">Live Server:</span>
            <span class="value" id="liveServerStatus">Checking...</span>
        </div>

        <div class="test-item">
            <span class="label">JavaScript:</span>
            <span class="value" id="jsStatus">Checking...</span>
        </div>

        <div class="test-item">
            <span class="label">Supabase Client:</span>
            <span class="value" id="supabaseStatus">Checking...</span>
        </div>

        <div class="test-item">
            <span class="label">Auth Manager:</span>
            <span class="value" id="authStatus">Checking...</span>
        </div>

        <div class="test-item">
            <span class="label">Current User:</span>
            <span class="value" id="userStatus">Checking...</span>
        </div>

        <div class="console-output" id="consoleOutput">
            <div class="log info">🔍 Running diagnostics...</div>
        </div>

        <div style="margin-top: 20px;">
            <a href="dashboard-seller.html" class="btn">Try Seller Dashboard</a>
            <a href="login.html" class="btn secondary">Go to Login</a>
            <button onclick="runTests()" class="btn secondary">Re-run Tests</button>
        </div>
    </div>

    <!-- Load required scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../api/supabase.js"></script>
    <script src="../js/local-auth.js"></script>

    <script>
        const output = document.getElementById('consoleOutput');
        
        function log(message, type = 'info') {
            const logEl = document.createElement('div');
            logEl.className = `log ${type}`;
            logEl.textContent = message;
            output.appendChild(logEl);
            output.scrollTop = output.scrollHeight;
            console.log(`[test] ${message}`);
        }

        function setStatus(id, text, isSuccess) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = text;
                el.style.color = isSuccess ? '#28a745' : '#dc3545';
            }
        }

        function showStatus(message, type = 'info') {
            const container = document.getElementById('statusContainer');
            const statusEl = document.createElement('div');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
            container.appendChild(statusEl);
        }

        async function runTests() {
            output.innerHTML = '<div class="log info">🔍 Running diagnostics...</div>';
            document.getElementById('statusContainer').innerHTML = '';

            // Test 1: Live Server
            log('✓ Live Server is running', 'success');
            setStatus('liveServerStatus', '✓ Running', true);

            // Test 2: JavaScript
            log('✓ JavaScript is working', 'success');
            setStatus('jsStatus', '✓ Working', true);

            // Test 3: Supabase
            await new Promise(resolve => setTimeout(resolve, 100));
            if (typeof db !== 'undefined' && db) {
                log('✓ Supabase client loaded', 'success');
                setStatus('supabaseStatus', '✓ Connected', true);
            } else {
                log('✗ Supabase client NOT loaded', 'error');
                setStatus('supabaseStatus', '✗ Not Connected', false);
                showStatus('Supabase client failed to load. Check api/supabase.js', 'error');
            }

            // Test 4: Auth Manager
            await new Promise(resolve => setTimeout(resolve, 200));
            if (typeof authManager !== 'undefined' && authManager) {
                log('✓ Auth Manager loaded', 'success');
                setStatus('authStatus', '✓ Loaded', true);

                // Test 5: Current User
                const user = authManager.getCurrentUser();
                if (user) {
                    log(`✓ User logged in: ${user.email}`, 'success');
                    log(`  Account Type: ${user.accountType}`, 'info');
                    setStatus('userStatus', `✓ ${user.email}`, true);

                    if (user.accountType === 'seller') {
                        showStatus('✅ You are logged in as a SELLER. Dashboard should work!', 'success');
                        log('✓ Account type is SELLER - dashboard access OK', 'success');
                    } else {
                        showStatus('⚠️ You are logged in as a BUYER. Seller dashboard will redirect you.', 'error');
                        log('✗ Account type is BUYER - seller dashboard will deny access', 'error');
                    }
                } else {
                    log('✗ No user logged in', 'error');
                    setStatus('userStatus', '✗ Not Logged In', false);
                    showStatus('⚠️ You are NOT logged in. Seller dashboard will redirect to login page.', 'error');
                }
            } else {
                log('✗ Auth Manager NOT loaded', 'error');
                setStatus('authStatus', '✗ Not Loaded', false);
                showStatus('Auth Manager failed to load. Check js/local-auth.js', 'error');
            }

            // Test 6: Database Connection
            if (typeof db !== 'undefined' && db) {
                log('Testing database connection...', 'info');
                try {
                    const { data, error } = await db.from('sellers').select('id').limit(1);
                    if (error) {
                        log(`✗ Database query failed: ${error.message}`, 'error');
                        showStatus('Database connection error. Check Supabase credentials.', 'error');
                    } else {
                        log('✓ Database connection working', 'success');
                    }
                } catch (err) {
                    log(`✗ Database test exception: ${err.message}`, 'error');
                }
            }

            log('--- Diagnostic Complete ---', 'info');
        }

        // Run tests on page load
        window.addEventListener('load', () => {
            setTimeout(runTests, 500);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — REWEAR</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="../index.html">REWEAR</a>
                </div>
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your new password</p>
            </div>

            <form class="auth-form" id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="newPassword" name="password" required 
                               placeholder="Enter new password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password">
                            <span class="password-toggle-icon">👁</span>
                        </button>
                    </div>
                    <div class="password-requirements">
                        <small>Password must be at least 8 characters long</small>
                    </div>
                    <div class="form-error" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmNewPassword" name="confirmPassword" required 
                               placeholder="Confirm new password" autocomplete="new-password">
                        <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="Show password">
                            <span class="password-toggle-icon">👁</span>
                        </button>
                    </div>
                    <div class="form-error" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="btn-primary-large auth-submit" id="resetSubmit">
                    <span class="btn-text">Update Password</span>
                    <span class="btn-spinner hidden">
                        <div class="spinner"></div>
                    </span>
                </button>

                <div class="form-error auth-form-error" id="formError"></div>
                <div class="form-success auth-form-success hidden" id="formSuccess">
                    <div class="success-icon">✓</div>
                    <p>Password updated successfully! Redirecting...</p>
                </div>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="login.html" class="auth-link">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="../js/core.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/local-auth.js"></script>
    <script>
        // Initialize reset password page
        document.addEventListener('DOMContentLoaded', () => {
            if (window.authManager) {
                window.authManager.initResetPasswordPage();
            }
        });
    </script>
</body>
</html>

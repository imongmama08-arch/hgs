<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Shop Fix</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        button { padding: 8px 16px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Shop.js Fix Test</h1>
        <p>This page tests if the shop.js errors have been resolved.</p>

        <div id="testResults"></div>

        <h3>Test Log</h3>
        <div id="testLog" class="log"></div>

        <button onclick="runTests()">Run Tests</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <!-- Load scripts in the same order as shop.html -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../api/supabase.js"></script>`n    <script src="../js/path-helper.js"></script>
    <script>
        function log(message, type = 'info') {
            const logEl = document.getElementById('testLog');
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${timestamp}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(`[Test] ${message}`);
        }

        function showResult(test, passed, message) {
            const resultsEl = document.getElementById('testResults');
            const resultClass = passed ? 'success' : 'error';
            const icon = passed ? '✅' : '❌';
            
            resultsEl.innerHTML += `
                <div class="test-result ${resultClass}">
                    ${icon} <strong>${test}:</strong> ${message}
                </div>
            `;
        }

        function clearLog() {
            document.getElementById('testLog').innerHTML = '';
            document.getElementById('testResults').innerHTML = '';
        }

        async function runTests() {
            clearLog();
            log('Starting shop.js fix tests...');

            // Test 1: Check if Supabase is loaded
            try {
                if (typeof supabase !== 'undefined') {
                    showResult('Supabase CDN', true, 'Supabase library is loaded');
                    log('✅ Supabase CDN loaded successfully');
                } else {
                    showResult('Supabase CDN', false, 'Supabase library not found');
                    log('❌ Supabase CDN not loaded');
                    return;
                }
            } catch (error) {
                showResult('Supabase CDN', false, error.message);
                log(`❌ Supabase CDN error: ${error.message}`);
                return;
            }

            // Test 2: Check if db client is created
            try {
                if (typeof db !== 'undefined' && db) {
                    showResult('Database Client', true, 'Supabase client (db) is created');
                    log('✅ Database client created successfully');
                } else {
                    showResult('Database Client', false, 'Database client (db) not found');
                    log('❌ Database client not created');
                    return;
                }
            } catch (error) {
                showResult('Database Client', false, error.message);
                log(`❌ Database client error: ${error.message}`);
                return;
            }

            // Test 3: Test database connection
            try {
                log('Testing database connection...');
                const { count, error } = await db.from('products').select('*', { count: 'exact', head: true });
                
                if (error) {
                    showResult('Database Connection', false, `Connection failed: ${error.message}`);
                    log(`❌ Database connection failed: ${error.message}`);
                } else {
                    showResult('Database Connection', true, `Connected successfully (${count || 0} products found)`);
                    log(`✅ Database connection successful, found ${count || 0} products`);
                }
            } catch (error) {
                showResult('Database Connection', false, error.message);
                log(`❌ Database connection error: ${error.message}`);
            }

            // Test 4: Test shop query (same as shop.js)
            try {
                log('Testing shop products query...');
                const { data, error } = await db.from('products')
                    .select('*')
                    .eq('status', 'approved')
                    .eq('in_stock', true);
                
                if (error) {
                    showResult('Shop Query', false, `Query failed: ${error.message}`);
                    log(`❌ Shop query failed: ${error.message}`);
                } else {
                    showResult('Shop Query', true, `Query successful (${data?.length || 0} approved products)`);
                    log(`✅ Shop query successful, found ${data?.length || 0} approved products`);
                    
                    if (data && data.length > 0) {
                        log(`Sample products: ${data.slice(0, 3).map(p => p.name).join(', ')}`);
                    }
                }
            } catch (error) {
                showResult('Shop Query', false, error.message);
                log(`❌ Shop query error: ${error.message}`);
            }

            // Test 5: Check helper functions
            try {
                if (typeof formatPHP === 'function') {
                    const testPrice = formatPHP(599);
                    showResult('Helper Functions', true, `formatPHP works: ${testPrice}`);
                    log(`✅ Helper functions loaded: formatPHP(599) = ${testPrice}`);
                } else {
                    showResult('Helper Functions', false, 'formatPHP function not found');
                    log('❌ Helper functions not loaded');
                }
            } catch (error) {
                showResult('Helper Functions', false, error.message);
                log(`❌ Helper functions error: ${error.message}`);
            }

            log('All tests completed!');
        }

        // Auto-run tests when page loads
        document.addEventListener('DOMContentLoaded', () => {
            log('Page loaded, running automatic tests...');
            setTimeout(runTests, 1000);
        });
    </script>
</body>
</html>
